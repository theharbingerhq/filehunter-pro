; ---------------------------------------------
; File Hunter Pro - Application Configuration
; ---------------------------------------------

[app]
name = File Hunter Pro
version = 1.26.7.0
developer = H.A.R.B.I.N.G.E.R.
license = Freeware
tagline = Intelligent Bulk Download Manager
repo_url = https://github.com/theharbingerhq/filehunter-pro

[paths]
assets_dir = assets
themes_dir = themes
theme_css_file = app_theme.css

[assets].
app_logo_svg = app_logo.svg
app_logo_ico = app_logo.ico
git_logo_svg = git_logo.svg
icon_settings_svg = icon_settings.svg
icon_help_svg = icon_help.svg
icon_about_svg = icon_about.svg
icon_faq_svg = icon_faq.svg
app_logo_svg_crop = 36,36,440,440

[limits]
max_txt_upload_mb = 200
max_download_mb = 2000
download_hide_threshold_mb = 2010
chunk_size_kb = 256
head_timeout_sec = 10
get_timeout_sec = 25

[network]
user_agent = Mozilla/5.0 (compatible; FileHunterPro/1.26.7.0; +https://streamlit.io)

[session]
session_id_prefix = FHPRO_
session_id_hex_len = 8
temp_subdir = fhp_sessions
zip_filename = fhp_downloads.zip
filename_max_len = 150
filename_index_width = 3

[ui]
favicon_fallback_emoji = 📦
progress_label_truncate = 60
log_tail_lines = 300
log_status_col_width = 12
log_name_col_width = 45
live_refresh_sec = 1
