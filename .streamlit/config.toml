# Streamlit Configuratuion for File Hunter Pro
# Default Theme & Server Limits

[theme]
base = "dark"
primaryColor = "#27AE60"
backgroundColor = "#0B0F0E"
secondaryBackgroundColor = "#141B18"
textColor = "#EAF2EE"
font = "sans serif"

[server]
# Must be >= MAX_TXT_UPLOAD_MB in the main python file, or the browser rejects large
maxUploadSize = 100
